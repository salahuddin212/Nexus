{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Nexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0e1117; --surface: #161b24; --surface-2: #1c2333;
            --border: #2a3040; --text: #e8eaf0; --text-muted: #7c8494;
            --accent: #6366f1; --accent-hover: #5254cc;
            --danger: #ef4444; --radius: 10px; --transition: 0.18s ease;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }

        .wordmark { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); text-decoration: none; margin-bottom: 32px; }
        .wordmark span { color: var(--accent); }

        .card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; }

        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
        .card-sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 24px; }
        .card-sub a { color: var(--accent); text-decoration: none; }
        .card-sub a:hover { text-decoration: underline; }

        .error-msg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.8125rem; color: var(--danger); }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input {
            width: 100%; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 13px; font-size: 0.875rem; color: var(--text);
            font-family: inherit; outline: none; transition: border-color var(--transition);
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-muted); }

        .forgot { display: block; text-align: right; font-size: 0.775rem; color: var(--text-muted); text-decoration: none; margin-top: 4px; }
        .forgot:hover { color: var(--text); }

        .btn-submit {
            width: 100%; background: var(--accent); color: #fff; border: none;
            border-radius: 8px; padding: 11px; font-size: 0.9rem; font-weight: 600;
            font-family: inherit; cursor: pointer; margin-top: 20px;
            transition: background var(--transition);
        }
        .btn-submit:hover { background: var(--accent-hover); }

        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 0.75rem; color: var(--text-muted); }

        .browse-link { display: block; text-align: center; font-size: 0.8125rem; color: var(--text-muted); text-decoration: none; transition: color var(--transition); }
        .browse-link:hover { color: var(--text); }

        .footer-links { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .footer-links a { font-size: 0.75rem; color: var(--text-muted); text-decoration: none; }
        .footer-links a:hover { color: var(--text); }
    </style>
</head>
<body>
    <a href="/" class="wordmark">Nex<span>us</span></a>

    <div class="card">
        <h1 class="card-title">Welcome back</h1>
        <p class="card-sub">New? <a href="/signup">Create an account →</a></p>

        {% for message in messages %}
        <div class="error-msg">{{ message }}</div>
        {% endfor %}

        <form action="/signin" method="POST">
            {% csrf_token %}
            {% if request.GET.next %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
            {% endif %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="your_username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                <a href="#" class="forgot">Forgot password?</a>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="divider"><span>or</span></div>
        <a href="/" class="browse-link">Browse without an account →</a>
    </div>

    <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
    </div>
</body>
</html>
